<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电价预测 - 新能源电力交易辅助决策系统</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <main class="main-content">
        <!-- 页面标题 -->
        <div class="page-header">
            <h2 class="page-title">电价预测</h2>
            <p class="page-subtitle">短期及中长期电价预测分析</p>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="filter-item">
                <label>训练节点</label>
                <select class="filter-select"><option>全部</option><option>节点A</option><option>节点B</option><option>节点C</option></select>
            </div>
            <div class="filter-item">
                <label>实时算法方案</label>
                <select class="filter-select" id="real-time-scheme">
                    <option>请选择实时算法方案</option>
                    <option>LSTM时序模型</option>
                    <option>XGBoost回归</option>
                    <option>LightGBM预测</option>
                    <option>Transformer模型</option>
                </select>
            </div>
            <div class="filter-item">
                <label>日前算法方案</label>
                <select class="filter-select" id="day-ahead-scheme">
                    <option>请选择日前算法方案</option>
                    <option>LSTM时序模型</option>
                    <option>XGBoost回归</option>
                    <option>LightGBM预测</option>
                    <option>Transformer模型</option>
                    <option>Prophet时序</option>
                </select>
            </div>
            <div class="filter-item">
                <label>预测日期</label>
                <input type="date" class="filter-input" id="forecast-date" value="2026-05-26">
            </div>
            <button class="btn-primary" id="btn-real-time">实时预测</button>
            <button class="btn-primary" id="btn-day-ahead">日前预测</button>
            <div class="filter-item">
                <label>查询日期</label>
                <input type="date" class="filter-input" id="query-date">
            </div>
            <button class="btn-primary" id="query-btn">查询</button>
        </div>

        <!-- 提示消息 -->
        <div id="toast-message" class="toast-message"></div>

        <!-- 结果区一：日前+实时现货价格预测（合并） -->
        <div class="result-section" id="section-combined">
            <h3 class="section-title" id="title-combined">日前 & 实时现货价格预测对比（2026-04-21）</h3>
            <div class="chart-card">
                <div id="combined-chart" class="chart-container"></div>
            </div>
            <div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>时段(15分钟)</th>
                            <th>日前预测价(元/MWh)</th>
                            <th>日前置信区间(95%)</th>
                            <th>日前偏差率(%)</th>
                            <th>实时预测价(元/MWh)</th>
                            <th>实时置信区间(95%)</th>
                            <th>实时偏差率(%)</th>
                        </tr>
                    </thead>
                    <tbody id="combined-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- 结果区三：未来7天现货价格预测 -->
        <div class="result-section" id="section-week-forecast">
            <h3 class="section-title" id="title-week-forecast">未来 7 天现货价格预测（2026-04-21 起）单位：元/MWh</h3>
            <div class="chart-card">
                <div id="week-forecast-chart" class="chart-container"></div>
            </div>
            <div class="table-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>最高价(元/MWh)</th>
                            <th>最低价(元/MWh)</th>
                            <th>均价(元/MWh)</th>
                            <th>波动率(%)</th>
                        </tr>
                    </thead>
                    <tbody id="week-forecast-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
