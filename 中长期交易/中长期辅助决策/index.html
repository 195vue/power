<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中长期辅助决策 - 新能源电力交易辅助决策系统</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <!-- 主内容区域 - 由主入口提供Header和Sidebar -->
        <main class="main-content">
            <!-- 页面标题 -->
            <div class="page-header">
                <h2 class="page-title">中长期辅助决策</h2>
                <p class="page-subtitle">中长期交易策略分析与辅助决策</p>
            </div>

            <!-- 筛选栏 -->
            <div class="filter-bar">
                <div class="filter-item">
                    <label>日期</label>
                    <input type="date" class="filter-input" value="2026-05-26">
                </div>
                <div class="filter-item">
                    <label>公司</label>
                    <select class="filter-select">
                        <option value="current" selected>当前公司</option>
                        <option value="company-a">公司A</option>
                        <option value="company-b">公司B</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>策略</label>
                    <select class="filter-select">
                        <option value="default" selected>常规日滚动策略</option>
                        <option value="strategy-a">保守策略</option>
                        <option value="strategy-b">激进策略</option>
                    </select>
                </div>
                <button class="btn-primary">查询</button>
                <button class="btn-save">保存策略</button>
            </div>

            <!-- 四象限布局 -->
            <div class="quadrant-grid">
                <!-- 左上：中长期余量分析 -->
                <div class="quadrant quadrant-tl">
                    <div class="quadrant-header">
                        <h3 class="panel-title">中长期余量分析</h3>
                    </div>
                    <div id="volume-analysis-chart" class="chart-container-large"></div>

                    <!-- 设置栏（单行） -->
                    <div class="settings-row">
                        <div class="set-group">
                            <label class="form-label">交易类型</label>
                            <select class="filter-select">
                                <option>日滚动</option>
                                <option>年度</option>
                                <option>月度</option>
                                <option>多月</option>
                                <option>月内</option>
                            </select>
                        </div>
                        <div class="set-group">
                            <label class="form-label">申报内容</label>
                            <select class="filter-select">
                                <option>电量</option>
                                <option>电价</option>
                            </select>
                        </div>
                        <div class="set-group">
                            <label class="form-label">起始时间</label>
                            <select class="filter-select" style="width:70px">
                                <option value="1">1时</option>
                                <option value="2">2时</option>
                                <option value="3">3时</option>
                                <option value="4">4时</option>
                                <option value="5">5时</option>
                                <option value="6">6时</option>
                                <option value="7">7时</option>
                                <option value="8">8时</option>
                                <option value="9">9时</option>
                                <option value="10">10时</option>
                                <option value="11">11时</option>
                                <option value="12">12时</option>
                                <option value="13">13时</option>
                                <option value="14">14时</option>
                                <option value="15">15时</option>
                                <option value="16">16时</option>
                                <option value="17">17时</option>
                                <option value="18">18时</option>
                                <option value="19">19时</option>
                                <option value="20">20时</option>
                                <option value="21">21时</option>
                                <option value="22">22时</option>
                                <option value="23">23时</option>
                                <option value="24">24时</option>
                            </select>
                        </div>
                        <div class="set-group">
                            <label class="form-label">终止时间</label>
                            <select class="filter-select" style="width:70px">
                                <option value="1">1时</option>
                                <option value="2">2时</option>
                                <option value="3">3时</option>
                                <option value="4">4时</option>
                                <option value="5">5时</option>
                                <option value="6">6时</option>
                                <option value="7">7时</option>
                                <option value="8">8时</option>
                                <option value="9">9时</option>
                                <option value="10">10时</option>
                                <option value="11">11时</option>
                                <option value="12">12时</option>
                                <option value="13">13时</option>
                                <option value="14">14时</option>
                                <option value="15">15时</option>
                                <option value="16">16时</option>
                                <option value="17">17时</option>
                                <option value="18">18时</option>
                                <option value="19">19时</option>
                                <option value="20">20时</option>
                                <option value="21">21时</option>
                                <option value="22">22时</option>
                                <option value="23">23时</option>
                                <option value="24" selected>24时</option>
                            </select>
                        </div>
                        <div class="set-group">
                            <label class="form-label">倍率</label>
                            <div style="display:flex;align-items:center;gap:4px">
                                <input type="text" class="form-input" placeholder="0" style="width:60px">
                                <button class="btn-modify" style="padding:4px 10px;font-size:12px">修改</button>
                            </div>
                        </div>
                        <div class="set-group">
                            <label class="form-label">固定值</label>
                            <div style="display:flex;align-items:center;gap:4px">
                                <input type="text" class="form-input" placeholder="0" style="width:60px">
                                <button class="btn-modify" style="padding:4px 10px;font-size:12px">修改</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右上：中长期申报策略 -->
                <div class="quadrant quadrant-tr">
                    <div class="quadrant-header">
                        <h3 class="panel-title">中长期申报策略</h3>
                    </div>
                    <div class="scroll-table-wrap">
                        <select class="filter-select trade-type-select">
                            <option value="daily" selected>日滚动</option>
                            <option value="intra-month">月内</option>
                            <option value="monthly">月度</option>
                            <option value="multi-month">多月</option>
                            <option value="yearly">年度</option>
                        </select>
                        <table class="strategy-table">
                            <thead>
                                <tr>
                                    <th>时段</th>
                                    <th>电量上限(MWh)</th>
                                    <th>电价取值区间(元/...</th>
                                    <th>概率(%)</th>
                                    <th>交易类型</th>
                                </tr>
                            </thead>
                            <tbody id="strategy-table-body">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 左下：价格策略分析 -->
                <div class="quadrant quadrant-bl">
                    <div class="quadrant-header">
                        <h3 class="panel-title">价格策略分析</h3>
                    </div>
                    <div class="panel-controls">
                        <span class="control-label">参考线</span>
                        <select class="filter-select ref-variety">
                            <option value="daily" selected>日滚动</option>
                            <option value="yearly">年度</option>
                            <option value="multi-month">多月</option>
                            <option value="monthly">月度</option>
                            <option value="intra-month">月内</option>
                        </select>
                        <select class="filter-select ref-stat">
                            <option value="avg" selected>平均数</option>
                            <option value="max">最大值</option>
                            <option value="min">最小值</option>
                        </select>
                    </div>
                    <div id="price-strategy-chart" class="chart-container-large"></div>

                </div>

                <!-- 右下：中长期收益 -->
                <div class="quadrant quadrant-br">
                    <div class="quadrant-header">
                        <h3 class="panel-title">中长期收益</h3>
                    </div>
                    <div class="scroll-table-wrap">
                        <table class="revenue-table">
                            <thead>
                                <tr>
                                    <th>时段</th>
                                    <th>日滚动(元/...</th>
                                    <th>年度(元/MWh)</th>
                                    <th>多月(元/MWh)</th>
                                    <th>月度(元/MWh)</th>
                                    <th>月内(元/MWh)</th>
                                    <th>汇总(元/MWh)</th>
                                </tr>
                            </thead>
                            <tbody id="revenue-table-body">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

    <!-- 加载脚本 -->
    <script src="script.js"></script>
</body>
</html>
