<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 新能源电力交易辅助决策系统</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="main-content">
        <div class="page-header">
            <h2 class="page-title">用户管理</h2>
            <p class="page-subtitle">管理系统用户账号、角色分配与场站访问权限</p>
        </div>

        <div class="filter-bar">
            <div class="filter-item">
                <label>用户名</label>
                <input class="filter-input" placeholder="搜索用户名" style="width:150px" id="user-search-name">
            </div>
            <div class="filter-item">
                <label>角色</label>
                <select class="filter-select" style="width:130px" id="user-filter-role">
                    <option value="all">全部角色</option>
                    <option>管理员</option>
                    <option>预测分析师</option>
                    <option>交易员</option>
                </select>
            </div>
            <button class="btn-primary" onclick="filterUsers()">查询</button>
            <div style="flex:1"></div>
            <button class="btn-primary" onclick="openUserModal()">+ 新增用户</button>
        </div>

        <div class="table-section" style="margin-top: var(--space-4)">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>姓名</th>
                        <th>角色</th>
                        <th>关联场站</th>
                        <th>手机号</th>
                        <th>最后登录</th>
                        <th>状态</th>
                        <th style="width:120px">操作</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
            <div class="pagination">
                <span class="info-text" id="user-count">共 0 条记录</span>
                <div><button class="page-btn active">1</button></div>
            </div>
        </div>
    </main>

    <!-- 新增/编辑弹窗 -->
    <div class="modal-overlay" id="user-modal" style="display:none">
        <div class="modal-panel" style="width:500px">
            <div class="modal-header">
                <h3 id="user-modal-title">新增用户</h3>
                <button class="modal-close" onclick="closeUserModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-section" style="flex:1">
                        <label class="form-label">用户名</label>
                        <input class="form-input" id="user-username" placeholder="登录账号">
                    </div>
                    <div class="form-section" style="flex:1">
                        <label class="form-label">姓名</label>
                        <input class="form-input" id="user-fullname" placeholder="真实姓名">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-section" style="flex:1">
                        <label class="form-label">角色</label>
                        <select class="form-input" id="user-role">
                            <option>管理员</option>
                            <option>预测分析师</option>
                            <option>交易员</option>
                        </select>
                    </div>
                    <div class="form-section" style="flex:1">
                        <label class="form-label">手机号</label>
                        <input class="form-input" id="user-phone" placeholder="手机号">
                    </div>
                </div>
                <div class="form-section">
                    <label class="form-label">关联场站</label>
                    <select class="form-input" id="user-station">
                        <option>全部场站</option>
                        <option>光伏电站A</option>
                        <option>风电场B</option>
                        <option>光伏电站C</option>
                        <option>水电站D</option>
                    </select>
                </div>
                <div class="form-section">
                    <label class="form-label">状态</label>
                    <select class="form-input" id="user-status">
                        <option>启用</option>
                        <option>禁用</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeUserModal()">取消</button>
                <button class="btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>

    <script>
        var userData = [
            { username: 'admin', fullname: '管理员', role: '管理员', station: '全部场站', phone: '138-0000-0001', lastLogin: '2026-05-25 09:00', status: '启用' },
            { username: 'analyst1', fullname: '张预测', role: '预测分析师', station: '光伏电站A', phone: '138-0000-0002', lastLogin: '2026-05-24 14:30', status: '启用' },
            { username: 'trader1', fullname: '李交易', role: '交易员', station: '全部场站', phone: '138-0000-0003', lastLogin: '2026-05-25 08:15', status: '启用' },
            { username: 'trader2', fullname: '王交易', role: '交易员', station: '风电场B', phone: '138-0000-0004', lastLogin: '2026-05-23 16:45', status: '启用' },
            { username: 'analyst2', fullname: '赵分析', role: '预测分析师', station: '水电站D', phone: '138-0000-0005', lastLogin: '2026-05-20 10:00', status: '禁用' }
        ];
        var userEditIndex = -1;

        function renderUsers() {
            var tbody = document.getElementById('user-table-body');
            tbody.innerHTML = '';
            userData.forEach(function(u, i) {
                var cls = u.status === '启用' ? 'badge-success' : 'badge-muted';
                tbody.innerHTML += '<tr>' +
                    '<td>' + u.username + '</td>' +
                    '<td>' + u.fullname + '</td>' +
                    '<td>' + u.role + '</td>' +
                    '<td>' + u.station + '</td>' +
                    '<td>' + u.phone + '</td>' +
                    '<td>' + u.lastLogin + '</td>' +
                    '<td><span class="badge ' + cls + '">' + u.status + '</span></td>' +
                    '<td><button class="btn-config" onclick="openUserModal(' + i + ')" style="padding:var(--space-1) var(--space-3);font-size:var(--text-sm)">编辑</button> <button class="btn-delete" onclick="deleteUser(' + i + ')" style="padding:var(--space-1) var(--space-3);font-size:var(--text-sm)">删除</button></td>' +
                    '</tr>';
            });
            document.getElementById('user-count').textContent = '共 ' + userData.length + ' 条记录';
        }

        function openUserModal(index) {
            var modal = document.getElementById('user-modal');
            if (index === undefined || index === null) {
                userEditIndex = -1;
                document.getElementById('user-modal-title').textContent = '新增用户';
                ['user-username','user-fullname','user-phone'].forEach(function(id) { document.getElementById(id).value = ''; });
                document.getElementById('user-role').value = '交易员';
                document.getElementById('user-station').value = '全部场站';
                document.getElementById('user-status').value = '启用';
            } else {
                userEditIndex = index;
                document.getElementById('user-modal-title').textContent = '编辑用户';
                var u = userData[index];
                document.getElementById('user-username').value = u.username;
                document.getElementById('user-fullname').value = u.fullname;
                document.getElementById('user-role').value = u.role;
                document.getElementById('user-station').value = u.station;
                document.getElementById('user-phone').value = u.phone;
                document.getElementById('user-status').value = u.status;
            }
            modal.style.display = 'flex';
        }

        function closeUserModal() { document.getElementById('user-modal').style.display = 'none'; }

        function saveUser() {
            var data = {
                username: document.getElementById('user-username').value,
                fullname: document.getElementById('user-fullname').value,
                role: document.getElementById('user-role').value,
                station: document.getElementById('user-station').value,
                phone: document.getElementById('user-phone').value,
                lastLogin: '--',
                status: document.getElementById('user-status').value
            };
            if (!data.username) { alert('请输入用户名'); return; }
            if (userEditIndex === -1) {
                userData.push(data);
            } else {
                userData[userEditIndex] = data;
            }
            renderUsers();
            closeUserModal();
        }

        function deleteUser(index) {
            if (confirm('确认删除用户「' + userData[index].username + '」？')) {
                userData.splice(index, 1);
                renderUsers();
            }
        }

        function filterUsers() { renderUsers(); }

        var _userModal = document.getElementById('user-modal');
        if (_userModal) {
            _userModal.addEventListener('click', function(e) { if (e.target === this) closeUserModal(); });
        }
        renderUsers();
    </script>
</body>
</html>
